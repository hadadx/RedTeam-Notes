<section class="page active notes-page">
  <h1>Notes</h1>
  <p class="intro">
    Write quick notes, keep them locally, or export them as a text file.
  </p>

  <div class="section-title">
    <span></span>
    <h2>Workspace Notes</h2>
    <span></span>
  </div>

  <div class="notes-panel">
    <textarea id="notesText" class="textarea textarea-bordered border-base-300 bg-base-100 notes-area focus:border-primary" spellcheck="false" placeholder="Write notes here..."></textarea>

    <div class="notes-actions">
      <button id="downloadNotes" class="btn btn-sm btn-primary notes-button" type="button">Download TXT</button>
      <button id="clearNotes" class="btn btn-sm btn-ghost border border-base-300 notes-button" type="button">Clear notes</button>
    </div>
  </div>
</section>
